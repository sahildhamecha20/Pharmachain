<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaChain | Smart Billing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    :root { --primary: #4361ee; --secondary: #3f37c9; --success: #4cc9f0; }
    body { background-color: #f8f9fc; font-family: 'Inter', sans-serif; }
    .billing-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; }
    .btn-whatsapp { background-color: #25D366; color: white; border: none; transition: 0.3s; }
    .btn-whatsapp:hover { background-color: #128C7E; color: white; transform: translateY(-2px); }
    .table-custom thead { background: var(--primary); color: white; }
    .total-section { background: #f1f5f9; border-radius: 12px; padding: 20px; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark m-0"><i class="bi bi-receipt-cutoff text-primary me-2"></i>Smart Billing</h2>
      <p class="text-muted small">Create and share invoices instantly</p>
    </div>
    <a href="/" class="btn btn-outline-secondary rounded-pill px-4"><i class="bi bi-arrow-left me-2"></i>Dashboard</a>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card billing-card p-4">
        <h5 class="fw-bold mb-4">Add Product</h5>
        <div class="mb-3">
          <label class="small fw-bold text-muted">MEDICINE NAME</label>
          <input type="text" id="itemName" class="form-control" placeholder="e.g. Paracetamol">
        </div>
        <div class="row mb-3">
          <div class="col-6">
            <label class="small fw-bold text-muted">BATCH ID</label>
            <input type="text" id="batch" class="form-control" placeholder="BT-99">
          </div>
          <div class="col-6">
            <label class="small fw-bold text-muted">QTY</label>
            <input type="number" id="qty" class="form-control" value="1">
          </div>
        </div>
        <div class="mb-4">
          <label class="small fw-bold text-muted">UNIT PRICE (₹)</label>
          <input type="number" id="price" class="form-control" placeholder="0.00">
        </div>
        <button onclick="addItem()" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm mb-2">
          <i class="bi bi-plus-lg me-2"></i>ADD TO BILL
        </button>
        <button onclick="saveToLiveStock()" class="btn btn-dark w-100 py-2 fw-bold rounded-3">
          <i class="bi bi-cloud-upload me-2"></i>PUSH TO LIVE STOCK
        </button>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card billing-card p-4 h-100">
        <div class="table-responsive">
          <table class="table table-hover align-middle table-custom">
            <thead>
            <tr>
              <th>Item</th>
              <th>Batch</th>
              <th class="text-center">Qty</th>
              <th class="text-center">Price</th>
              <th class="text-end">Total</th>
            </tr>
            </thead>
            <tbody id="billBody">
            </tbody>
          </table>
        </div>

        <div class="mt-auto pt-4 border-top">
          <div class="row align-items-center">
            <div class="col-md-6 total-section">
              <span class="text-muted fw-bold">GRAND TOTAL</span>
              <h2 class="fw-bold text-primary m-0">₹<span id="displayTotal">0.00</span></h2>
            </div>
            <div class="col-md-6 text-end">
              <button onclick="generatePDF()" class="btn btn-outline-dark px-4 py-2 me-2 rounded-pill fw-bold">
                <i class="bi bi-file-earmark-pdf me-2"></i>PDF
              </button>
              <button onclick="sendWhatsApp()" class="btn btn-whatsapp px-4 py-2 rounded-pill fw-bold shadow-sm">
                <i class="bi bi-whatsapp me-2"></i>WHATSAPP BILL
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let itemsList = [];

  function addItem() {
    const name = document.getElementById('itemName').value;
    const batch = document.getElementById('batch').value;
    const qty = parseFloat(document.getElementById('qty').value);
    const price = parseFloat(document.getElementById('price').value);

    if(!name || !qty || !price) { alert("Please fill all details!"); return; }

    itemsList.push({ name, batch: batch || 'N/A', qty, price, total: qty * price });
    updateTable();
    clearInputs();
  }

  function updateTable() {
    const body = document.getElementById('billBody');
    let grandTotal = 0;
    body.innerHTML = "";
    itemsList.forEach((item, index) => {
      grandTotal += item.total;
      body.innerHTML += `
        <tr>
          <td class="fw-bold text-dark">${item.name}</td>
          <td class="text-muted small">${item.batch}</td>
          <td class="text-center">${item.qty}</td>
          <td class="text-center">₹${item.price.toFixed(2)}</td>
          <td class="text-end fw-bold">₹${item.total.toFixed(2)}</td>
        </tr>`;
    });
    document.getElementById('displayTotal').innerText = grandTotal.toFixed(2);
  }

  function clearInputs() {
    document.getElementById('itemName').value = '';
    document.getElementById('batch').value = '';
    document.getElementById('price').value = '';
  }

  async function saveToLiveStock() {
    if(itemsList.length === 0) { alert("Add at least one item first!"); return; }

    // Sirf last added item ko stock mein bhejne ke liye logic
    const lastItem = itemsList[itemsList.length - 1];
    const data = {
      medicineName: lastItem.name,
      batchId: lastItem.batch,
      quantity: lastItem.qty,
      sellingPrice: lastItem.price,
      expiryDate: "2027-12-31" // Default expiry
    };

    try {
      const res = await fetch('/api/inventory/batch/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      if(res.ok) alert("Stock Updated Live! 🚀");
    } catch (e) { alert("Azure Sync Failed!"); }
  }

  function sendWhatsApp() {
    if(itemsList.length === 0) { alert("Bill is empty!"); return; }
    const phone = prompt("Enter WhatsApp Number (10 digits):");
    if(!phone) return;

    let text = `*PharmaChain - Digital Invoice*%0A---------------------------%0A`;
    itemsList.forEach(i => {
      text += `${i.name} | Qty: ${i.qty} | ₹${i.total}%0A`;
    });
    text += `---------------------------%0A*Total: ₹${document.getElementById('displayTotal').innerText}*%0A_Thank you for your visit!_`;

    window.open(`https://wa.me/91${phone}?text=${text}`, '_blank');
  }

  function generatePDF() {
    window.print(); // Simple way to generate invoice for now
  }
</script>
</body>
</html>
