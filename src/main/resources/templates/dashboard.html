<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaChain | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --sidebar-bg: #2c3e50; --primary-blue: #3498db; }
    body { background-color: #f8f9fa; }
    .sidebar { height: 100vh; background: var(--sidebar-bg); color: white; position: fixed; width: 250px; }
    .main-content { margin-left: 250px; padding: 20px; }
    .nav-link { color: rgba(255,255,255,0.8); margin: 10px 0; border-radius: 5px; }
    .nav-link:hover, .nav-link.active { background: var(--primary-blue); color: white; }
    .stat-card { border: none; border-radius: 15px; transition: transform 0.3s; }
    .stat-card:hover { transform: translateY(-5px); }
  </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3">
  <h3 class="text-center py-3 border-bottom">PharmaChain</h3>
  <ul class="nav nav-pills flex-column mb-auto mt-3">
    <li><a href="/dashboard" class="nav-link active"><i class="fa fa-home me-2"></i> Dashboard</a></li>
    <li><a href="/bill" class="nav-link"><i class="fa fa-file-invoice me-2"></i> Quick Billing</a></li>
    <li><a href="/inventory" class="nav-link"><i class="fa fa-boxes me-2"></i> Inventory</a></li>
    <li><a href="/audit" class="nav-link"><i class="fa fa-history me-2"></i> Audit Logs</a></li>
  </ul>
  <hr>
  <button class="btn btn-danger w-100" onclick="logout()"><i class="fa fa-sign-out-alt me-2"></i> Logout</button>
</div>

<div class="main-content">
  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Welcome to Dashboard</h2>
      <span class="badge bg-success p-2">System Active</span>
    </div>

    <div class="row text-white">
      <div class="col-md-4 mb-3">
        <div class="card stat-card bg-primary p-3">
          <h5>Total Stock</h5>
          <h2 id="totalStock">0</h2>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card stat-card bg-success p-3">
          <h5>Total Sales (Today)</h5>
          <h2 id="totalSales">0</h2>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card stat-card bg-info p-3">
          <h5>Total Revenue</h5>
          <h2 id="totalRevenue">₹0.00</h2>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0 text-danger font-weight-bold"><i class="fa fa-exclamation-triangle"></i> Expiry Alerts (Next 30 Days)</h5>
          </div>
          <div class="card-body">
            <table class="table table-hover">
              <thead class="table-light">
              <tr>
                <th>Medicine Name</th>
                <th>Batch ID</th>
                <th>Expiry Date</th>
                <th>Action</th>
              </tr>
              </thead>
              <tbody id="expiryTable">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Load Dashboard Data from /api/dashboard
  async function fetchDashboardStats() {
      try {
          const res = await fetch('/api/dashboard');
          const data = await res.json();
          document.getElementById('totalStock').innerText = data.totalStock;
          document.getElementById('totalSales').innerText = data.totalSales;
          document.getElementById('totalRevenue').innerText = '₹' + data.totalRevenue.toLocaleString();
      } catch (err) { console.error("Stats failed", err); }
  }

  // Load Expiry Alerts from /api/inventory/batch/expiry-alerts
  async function fetchExpiryAlerts() {
      try {
          const res = await fetch('/api/inventory/batch/expiry-alerts');
          const batches = await res.json();
          const tableBody = document.getElementById('expiryTable');
          tableBody.innerHTML = batches.length === 0 ? '<tr><td colspan="4" class="text-center">No expiring items!</td></tr>' : '';

          batches.forEach(batch => {
              tableBody.innerHTML += `
                  <tr>
                      <td>${batch.medicineName}</td>
                      <td>${batch.batchId}</td>
                      <td class="text-danger"><strong>${batch.expiryDate}</strong></td>
                      <td><button class="btn btn-sm btn-outline-warning">Notify Distributor</button></td>
                  </tr>`;
          });
      } catch (err) { console.error("Expiry fetch failed", err); }
  }

  function logout() {
      localStorage.clear();
      window.location.href = '/login';
  }

  // Init functions
  window.onload = () => {
      fetchDashboardStats();
      fetchExpiryAlerts();
  }
</script>

</body>
</html>
