<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaChain - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #e9ecef; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    /* Border-none ensures no line under title */
    .login-card { width: 100%; max-width: 380px; padding: 40px; border-radius: 15px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: none; }
    .pharma-title { font-weight: 700; color: #2c3e50; border: none !important; margin-bottom: 5px; }
    .btn-primary { background-color: #0d6efd; border: none; font-weight: 600; }
    .form-control:focus { box-shadow: none; border-color: #0d6efd; }
  </style>
</head>
<body>
<div class="login-card">
  <h2 class="text-center pharma-title">PharmaChain</h2>

  <p class="text-center text-primary mb-4" style="font-size: 0.85rem; font-weight: 600; font-style: italic;">
    "SECURE PHARMA PARTNER"
  </p>

  <div id="errorMsg" class="alert alert-danger" style="display:none; font-size: 0.85rem;">Invalid email or password</div>

  <form id="loginForm" autocomplete="off">
    <div class="mb-3">
      <label class="form-label" style="font-weight: 500;">User ID</label>
      <input type="email" id="loginEmail" class="form-control"
             placeholder="Enter your email" required
             autocomplete="new-password"> </div>
    <div class="mb-3">
      <label class="form-label" style="font-weight: 500;">Security Key</label>
      <input type="password" id="loginPassword" class="form-control"
             placeholder="Enter your password" required
             autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Sign in</button>
  </form>

  <p class="mt-4 text-center text-muted" style="font-size: 0.9rem;">
    New here? <a href="/register" style="text-decoration: none; font-weight: 600;">Create an account</a>
  </p>
</div>
<script>
  document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
          // URL matching your UserController @RequestMapping("/api/users")
          const response = await fetch(`/api/users/login?email=${email}&password=${password}`, {
              method: 'POST'
          });

          if (response.ok) {
              console.log("Login Success!");
              window.location.href = "/dashboard";
          } else {
              const errorText = await response.text();
              console.error("Login Failed:", errorText);
              errorMsg.style.display = 'block';
              errorMsg.innerText = "Invalid credentials. Please try again.";
          }
      } catch (err) {
          console.error("Fetch Error:", err);
          alert("Connection error! Backend check karein.");
      }
  };
</script>
</body>
</html>
