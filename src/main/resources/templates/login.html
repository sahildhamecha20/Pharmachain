<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PharmaChain | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; display: flex; align-items: center; height: 100vh; }
    .login-card { width: 100%; max-width: 400px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; }
    .btn-primary { background: #2c3e50; border: none; }
    .btn-primary:hover { background: #1a252f; }
  </style>
</head>
<body>

<div class="login-card">
  <h3 class="text-center mb-4"></h3>
  <h5 class="text-center text-muted mb-4">PharmaChain</h5>

  <div id="errorMsg" class="alert alert-danger d-none"></div>


    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required placeholder="*******">
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;

          const response = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password })
          });

          if (response.ok) {
              // Agar login success hua toh dashboard par bhejo
              window.location.href = '/dashboard';
          } else {
              alert("Invalid Login!");
          }
      });
    </script>
</div>
</body>
</html>
