<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PharmaChain | Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" href="/dashboard"><b>PHARMACHAIN</b></a>
    <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#addMedModal">+ Add Medicine</button>
</nav>

<div class="container mt-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h4>Current Stock</h4>
            <table class="table mt-3">
                <thead><tr><th>ID</th><th>Name</th><th>Company</th><th>Stock</th><th>Price</th><th>Expiry</th></tr></thead>
                <tbody id="medTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadMeds() {
        const res = await fetch('/api/medicine/all');
        const meds = await res.json();
        let html = "";
        meds.forEach(m => {
            html += `<tr><td>${m.id}</td><td>${m.name}</td><td>${m.company}</td><td>${m.quantity}</td><td>₹${m.price}</td><td>${m.expiryDate}</td></tr>`;
        });
        document.getElementById('medTableBody').innerHTML = html;
    }
    window.onload = loadMeds;
</script>
</body>
</html>
