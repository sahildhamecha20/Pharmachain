<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>PharmaChain | Audit Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div class="container bg-white p-4 shadow-sm rounded">
  <h3><b>PHARMACHAIN</b> | Stock Audit Logs</h3>
  <hr>
  <table class="table table-striped mt-3">
    <thead class="table-dark">
    <tr>
      <th>Medicine ID</th>
      <th>Batch</th>
      <th>Old Qty</th>
      <th>New Qty</th>
      <th>Action</th>
      <th>Changed By</th>
      <th>Date/Time</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="log : ${logs}">
      <td th:text="${log.medicineId}"></td>
      <td th:text="${log.batchNo}"></td>
      <td th:text="${log.oldQty}"></td>
      <td th:text="${log.newQty}"></td>
      <td th:text="${log.action}"></td>
      <td th:text="${log.changedBy}"></td>
      <td th:text="${log.changedAt}"></td>
    </tr>
    </tbody>
  </table>
  <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
