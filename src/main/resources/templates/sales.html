<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaChain | Sales Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background-color: #f4f7f6; }
    .navbar { background-color: #2c3e50; }
    .sales-card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .header-section { background: white; padding: 20px; border-bottom: 2px solid #eee; margin-bottom: 30px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-2">
  <a class="navbar-brand" href="/dashboard"><b>PHARMACHAIN</b></a>
  <div class="text-white">Admin Sales Panel</div>
</nav>

<div class="header-section">
  <div class="container">
    <h3><i class="fa fa-chart-line text-primary"></i> Sales & Earnings Report</h3>
    <p class="text-muted">Real-time business performance tracking</p>
  </div>
</div>

<div class="container">
  <div class="row text-center">
    <div class="col-md-6 mb-4">
      <div class="card sales-card p-4 border-start border-primary border-5">
        <h5 class="text-muted">Total Turnover</h5>
        <h1 class="display-4 text-primary" id="totalTurnover">₹0.00</h1>
        <p class="mb-0">Gross business value generated</p>
      </div>
    </div>

    <div class="col-md-6 mb-4">
      <div class="card sales-card p-4 border-start border-success border-5">
        <h5 class="text-muted">Total Sales Count</h5>
        <h1 class="display-4 text-success" id="salesCount">0</h1>
        <p class="mb-0">Total number of bills generated</p>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-12 text-center">
      <button onclick="loadSalesReport()" class="btn btn-outline-primary">
        <i class="fa fa-sync"></i> Refresh Data
      </button>
      <a href="/dashboard" class="btn btn-secondary ms-2">Back to Dashboard</a>
    </div>
  </div>
</div>

<script>
  async function loadSalesReport() {
      try {
          // Fetching data from AdminDashboardController endpoint
          const response = await fetch('/api/admin/earnings');
          const data = await response.json();

          // Mapping JSON values to UI
          document.getElementById('totalTurnover').innerText = "₹" + data.totalTurnover.toLocaleString();
          document.getElementById('salesCount').innerText = data.totalSalesCount;

      } catch (error) {
          console.error("Error fetching sales data:", error);
          alert("Could not load sales data. Please check your backend.");
      }
  }

  // Auto load on page refresh
  window.onload = loadSalesReport;
</script>

</body>
</html>
