<h2>Make Sale</h2>

<form onsubmit="makeSale(event)">
  <input type="number" id="batchId" placeholder="Batch ID" required>
  <input type="number" id="qtySold" placeholder="Quantity" required>
  <input type="number" step="0.01" id="price" placeholder="Selling Price" required>
  <button>Add Sale</button>
</form>

<script src="../static/sales.js"></script>
