<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PharmaChain | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; display: flex; align-items: center; height: 100vh; }
    .reg-card { width: 100%; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: #fff; }
    .btn-dark { background: #2c3e50; border: none; }
  </style>
</head>
<body>
<div class="reg-card">
  <h2 class="text-center mb-4"><b>PHARMACHAIN</b></h2>
  <h5 class="text-center text-muted mb-4">Create New Account</h5>
  <form id="regForm">
    <div class="row">
      <div class="col-md-6 mb-3">
        <input type="text" id="name" class="form-control" placeholder="Full Name" required>
      </div>
      <div class="col-md-6 mb-3">
        <input type="text" id="username" class="form-control" placeholder="Username" required>
      </div>
    </div>
    <div class="mb-3">
      <input type="email" id="email" class="form-control" placeholder="Email Address" required>
    </div>
    <div class="mb-3">
      <input type="text" id="mobile" class="form-control" placeholder="Mobile Number" required>
    </div>
    <div class="mb-3">
      <input type="password" id="password" class="form-control" placeholder="Password" required>
    </div>
    <button type="submit" class="btn btn-dark w-100">Register</button>
  </form>
  <div class="text-center mt-3">
    <p>Already have an account? <a href="/login" class="text-decoration-none">Login</a></p>
  </div>
</div>

<script>
  document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userData = {
          name: document.getElementById('name').value,
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          mobile: document.getElementById('mobile').value,
          password: document.getElementById('password').value,
          role: "USER"
      };

      const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
      });

      if(res.ok) { alert("Registration Successful!"); window.location.href = '/login'; }
      else { alert("Error in registration"); }
  });
</script>
</body>
</html>
