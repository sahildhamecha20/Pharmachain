<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PharmaChain | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fc; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .auth-card { width: 400px; padding: 40px; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .btn-primary { background: #4361ee; border: none; padding: 12px; border-radius: 10px; font-weight: 600; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <h3 class="fw-bold">Create Account</h3>
    <p class="text-muted small">Join PharmaChain Portal</p>
  </div>
  <form id="registerForm">
    <div class="mb-3"><input type="text" id="username" class="form-control bg-light border-0" placeholder="Username" required></div>
    <div class="mb-3"><input type="email" id="email" class="form-control bg-light border-0" placeholder="Email Address" required></div>
    <div class="mb-4"><input type="password" id="password" class="form-control bg-light border-0" placeholder="Password" required></div>
    <button type="submit" class="btn btn-primary w-100 mb-3">Register Now</button>
    <div class="text-center"><a href="login.html" class="text-decoration-none small text-primary">Already have an account? Login</a></div>
  </form>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
      };

      try {
          const response = await fetch('/api/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
          });

          if (response.ok) {
              // Ye hai wo main correction: Success hote hi index page par bhejo
              alert("Account Created Successfully!");
              window.location.href = "index.html";
          } else {
              const err = await response.text();
              alert("Error: " + err);
          }
      } catch (error) {
          alert("Server Error. Please try again.");
      }
  });
</script>
</body>
</html>
