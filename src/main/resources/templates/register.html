<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PharmaChain - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; display: flex; align-items: center; height: 100vh; }
    .register-card { width: 100%; max-width: 400px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 10px; background: #fff; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center">
  <div class="register-card">
    <h3 class="text-center text-primary mb-4">Create Account</h3>
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="regName" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="regEmail" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="regPassword" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Register</button>
      <p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>
</div>

<script>
  document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const userData = {
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value
      };

      const response = await fetch('/api/users/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(userData)
      });

      if(response.ok) {
          alert("Registration Successful! Now please login.");
          window.location.href = "login.html";
      } else {
          alert("Registration Failed. Try again.");
      }
  };
</script>
</body>
</html>
